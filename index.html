<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
<title>Daily Log</title>
<meta name="theme-color" content="#FAF8F4" id="theme-color-meta" />
<script>
  // Apply saved theme before paint to avoid flash
  (function() {
    const t = localStorage.getItem("dl-theme");
    if (t === "dark") document.documentElement.setAttribute("data-theme", "dark");
  })();
</script>

<!-- PWA: installable on phones via "Add to Home Screen" -->
<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="icons/icon-192.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Daily Log" />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/@tabler/icons-webfont@2.47.0/dist/tabler-icons.min.css">

<link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div id="root"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/config.js"></script>
<script>
  const sb = window.supabase.createClient(window.SUPABASE_URL, window.SUPABASE_PUBLISHABLE_KEY);
</script>
<script src="js/auth.js"></script>
<script src="js/data.js"></script>
<script src="js/app.js"></script>

<script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("sw.js").catch(() => {});
    });
  }
</script>

</body>
</html>
